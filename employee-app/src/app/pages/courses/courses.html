<input 
type="text"
placeholder="Search course"
[(ngModel)]="searchText"
>

<h2>Available Courses</h2>

<div *ngFor="let course of courses">

  <h3>{{course.name}}</h3>

  <p>
    Duration: {{course.duration}}
  </p>

  <button (click)="enroll(course.name)">
    Enroll
  </button>

</div>


<div *ngIf="selectedCourse">

  <h3>
    You enrolled for {{selectedCourse}}
  </h3>

</div>
